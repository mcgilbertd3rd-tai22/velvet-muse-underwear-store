<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Search · Velvet Muse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/style.css" />
<style>
  .search-page { padding: 24px 16px 60px; max-width: 720px; margin: 0 auto; }
  .search-back { display: inline-block; margin-bottom: 14px; color: var(--rose-gold); font-size: .9rem; font-weight: 600; text-decoration: none; }
  .search-page h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin: 4px 0 4px; }
  .search-page p.sub { color: var(--ink-soft); font-size: .9rem; margin: 0 0 18px; }
  .search-input-wrap { position: relative; margin-bottom: 22px; }
  .search-input-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .search-input-wrap input { width: 100%; padding: 14px 18px 14px 46px; border: 1.5px solid var(--line); border-radius: 999px; font-family: inherit; font-size: 1rem; background: white; }
  .cat-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 14px; background: linear-gradient(135deg, var(--pink-soft), #fff); border: 1.5px solid var(--line); border-radius: 16px; cursor: pointer; text-decoration: none; color: var(--ink); font-weight: 600; transition: var(--transition); }
  .cat-tile:hover { border-color: var(--rose-gold); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .cat-tile .ic { font-size: 2rem; margin-bottom: 8px; }
  .cat-tile .lbl { font-size: 1rem; }
</style>
</head>
<body>
<div class="search-page">
  <a href="/shop.html" class="search-back" data-i18n="search.back">← Back to Boutique</a>
  <h1 data-i18n="search.title">Browse categories</h1>
  <p class="sub" data-i18n="search.subtitle">Pick a collection or search by keyword.</p>

  <form id="qform" class="search-input-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" id="q" data-i18n-ph="shop.search" placeholder="Search lace, silk, sets…" autofocus />
  </form>

  <div class="cat-tiles">
    <a href="/shop.html?cat=bras" class="cat-tile"><span class="ic">👙</span><span class="lbl" data-i18n="cat.bras">Bras</span></a>
    <a href="/shop.html?cat=panties" class="cat-tile"><span class="ic">🩲</span><span class="lbl" data-i18n="cat.panties">Panties</span></a>
    <a href="/shop.html?cat=lingerie" class="cat-tile"><span class="ic">🌹</span><span class="lbl" data-i18n="cat.lingerie">Lingerie Sets</span></a>
    <a href="/shop.html?cat=underwear" class="cat-tile"><span class="ic">✨</span><span class="lbl" data-i18n="cat.underwear">Underwear</span></a>
  </div>
</div>

<script src="/i18n.js"></script>
<script>
  document.getElementById("qform").addEventListener("submit", (e) => {
    e.preventDefault();
    const v = document.getElementById("q").value.trim();
    location.href = "/shop.html" + (v ? ("?q=" + encodeURIComponent(v)) : "");
  });
</script>
</body>
</html>
