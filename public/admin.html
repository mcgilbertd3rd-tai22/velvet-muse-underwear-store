<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Velvet Muse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/style.css" />
</head>
<body class="admin-page">

<header class="admin-header">
  <div class="container">
    <a href="/shop.html" class="brand"><span class="brand-dot"></span> Velvet Muse · Admin</a>
    <div style="display: flex; gap: 10px;">
      <a href="/shop.html" class="btn btn-outline btn-sm">Back to Boutique</a>
      <button id="reset-btn" class="btn btn-ghost btn-sm">Reset Catalog</button>
      <button id="logout-btn" class="btn btn-primary btn-sm">Sign Out</button>
    </div>
  </div>
</header>

<div class="admin-grid">
  <!-- Form -->
  <section class="admin-card">
    <h3 id="form-title">Add a Product</h3>
    <form id="product-form">
      <input type="hidden" name="id" />
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="name" required placeholder="Soir Lace Bralette" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category" required>
          <option value="bras">Bras</option>
          <option value="panties">Panties</option>
          <option value="lingerie">Lingerie Sets</option>
          <option value="underwear">Underwear</option>
        </select>
      </div>
      <div style="display: flex; gap: 12px;">
        <div class="form-group" style="flex: 1;">
          <label>Price (USD, min $15)</label>
          <input type="number" name="price" min="15" step="0.01" required placeholder="68" />
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Discount %</label>
          <input type="number" name="discount" min="0" max="90" step="1" value="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Rating (0–5)</label>
        <input type="number" name="rating" min="0" max="5" step="0.1" value="5" />
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" name="image" required placeholder="https://…" />
      </div>
      <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn btn-primary btn-block" id="save-btn">Save Product</button>
        <button type="button" class="btn btn-outline btn-sm" id="cancel-btn" hidden>Cancel</button>
      </div>
      <div class="form-msg" id="form-msg"></div>
    </form>
  </section>

  <!-- Table -->
  <section class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
      <h3 style="margin: 0;">All Products</h3>
      <span id="count" style="font-size: 0.85rem; color: var(--muted);"></span>
    </div>
    <div class="admin-table" id="table"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="/products.js"></script>
<script src="/admin.js"></script>
</body>
</html>
